name: Publish NuGet Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3). Leave blank to auto-increment patch."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            # Read base version from csproj and auto-increment patch using run number
            BASE=$(grep -oPm1 '(?<=<Version>)[^<]+' AndroidBillingBridge/AndroidBillingBridge.csproj)
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=${{ github.run_number }}
            echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $(grep 'version=' "$GITHUB_OUTPUT" | tail -1)"

      - name: Pack AndroidBillingBridge
        run: |
          dotnet pack AndroidBillingBridge/AndroidBillingBridge.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -o ./artifacts

      - name: Pack AndroidPlayGamesBridge
        run: |
          dotnet pack AndroidPlayGamesBridge/AndroidPlayGamesBridge.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -o ./artifacts

      - name: Pack AndroidAdsBridge
        run: |
          dotnet pack AndroidAdsBridge/AndroidAdsBridge.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -o ./artifacts

      - name: Pack AndroidReviewBridge
        run: |
          dotnet pack AndroidReviewBridge/AndroidReviewBridge.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -o ./artifacts

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
